<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Neon Drive AI Scapes cover</title>
  <desc id="desc">Futuristic neon roadway with AI scan layers and horizon glow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04040b"/>
      <stop offset="100%" stop-color="#120a1d"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#25e7ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff4cc8" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <ellipse cx="1100" cy="260" rx="300" ry="140" fill="#1ff2ff" opacity="0.14"/>
  <ellipse cx="1240" cy="300" rx="260" ry="110" fill="#ff4cc8" opacity="0.12"/>

  <g stroke="#2cecff" stroke-opacity="0.26">
    <path d="M0 760H1600"/>
    <path d="M0 700H1600"/>
    <path d="M0 640H1600"/>
    <path d="M0 580H1600"/>
    <path d="M0 520H1600"/>
  </g>

  <g fill="none" stroke="url(#road)" stroke-width="8" stroke-linecap="round" filter="url(#glow)">
    <path d="M180 940 L680 510 L840 510 L420 940"/>
    <path d="M760 940 L940 510 L1070 510 L980 940"/>
    <path d="M1240 940 L1120 510 L1240 510 L1420 940"/>
  </g>

  <g fill="none" stroke="#69f8ff" stroke-width="3" opacity="0.7">
    <rect x="1085" y="480" width="290" height="170" rx="18"/>
    <line x1="1085" y1="535" x2="1375" y2="535"/>
    <line x1="1085" y1="590" x2="1375" y2="590"/>
  </g>

  <g fill="#ff4cc8" filter="url(#glow)">
    <circle cx="1170" cy="565" r="8"/>
    <circle cx="1235" cy="565" r="8"/>
    <circle cx="1300" cy="565" r="8"/>
  </g>

  <text x="95" y="165" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" letter-spacing="4">AUTONOMOUS VISION</text>
  <text x="95" y="265" fill="#ffffff" font-family="Bebas Neue, Oswald, Arial, sans-serif" font-size="122" letter-spacing="5">NEON DRIVE AI SCAPES</text>
  <text x="95" y="318" fill="rgba(255,255,255,0.72)" font-family="Inter, Arial, sans-serif" font-size="28">Perception, planning, and synthetic road intelligence.</text>
</svg>
