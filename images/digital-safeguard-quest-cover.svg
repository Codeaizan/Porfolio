<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Digital Safeguard Quest cover</title>
  <desc id="desc">Cybersecurity themed neon shield cover with lock and network trails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a13"/>
      <stop offset="100%" stop-color="#0a1320"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ceb70"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g stroke="rgba(120,200,255,0.18)">
    <path d="M120 820 C 390 760, 650 720, 920 620" fill="none"/>
    <path d="M260 890 C 520 790, 770 760, 1120 610" fill="none"/>
    <path d="M440 930 C 690 820, 980 760, 1380 600" fill="none"/>
  </g>

  <g filter="url(#glow)">
    <path d="M1120 220 L1300 300 V480 C1300 620 1205 720 1120 760 C1035 720 940 620 940 480 V300 Z" fill="none" stroke="url(#shield)" stroke-width="10"/>
    <rect x="1068" y="430" width="104" height="94" rx="14" fill="none" stroke="#72f5ff" stroke-width="8"/>
    <path d="M1090 430 V398 C1090 366 1114 340 1144 340 C1174 340 1198 366 1198 398 V430" fill="none" stroke="#72f5ff" stroke-width="8"/>
    <circle cx="1120" cy="474" r="8" fill="#72f5ff"/>
  </g>

  <g fill="#4ceb70" filter="url(#glow)">
    <circle cx="1030" cy="350" r="7"/>
    <circle cx="1190" cy="320" r="7"/>
    <circle cx="1260" cy="410" r="7"/>
    <circle cx="980" cy="500" r="7"/>
  </g>

  <g stroke="#4ceb70" stroke-width="2" opacity="0.65">
    <line x1="1030" y1="350" x2="1120" y2="390"/>
    <line x1="1190" y1="320" x2="1144" y2="390"/>
    <line x1="1260" y1="410" x2="1170" y2="460"/>
    <line x1="980" y1="500" x2="1068" y2="472"/>
  </g>

  <text x="95" y="165" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="38" letter-spacing="4">CYBER SECURITY</text>
  <text x="95" y="265" fill="#ffffff" font-family="Bebas Neue, Oswald, Arial, sans-serif" font-size="120" letter-spacing="5">DIGITAL SAFEGUARD QUEST</text>
  <text x="95" y="318" fill="rgba(255,255,255,0.72)" font-family="Inter, Arial, sans-serif" font-size="28">Interactive defense training with threat-aware workflows.</text>
</svg>
